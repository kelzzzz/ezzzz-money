name: Checkstyle CI
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  checkstyle:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: maven
        
    - name: Run Checkstyle (Fail on violations)
      working-directory: ./ezzzzmoney-spring-backend
      run: mvn checkstyle:check
